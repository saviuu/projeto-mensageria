version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mensageria_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: relatorios_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - mensageria_network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mensageria_broker
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: adminpassword
    ports:
      - "5672:5672"   # Porta para comunicação dos microserviços (AMQP)
      - "15672:15672" # Porta para a interface gráfica de gerenciamento
    networks:
      - mensageria_network

networks:
  mensageria_network:
    driver: bridge

volumes:
  pgdata:
